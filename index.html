    function renderPanelActions(feature) {
      const actionsEl = document.getElementById('panel-actions');
      const fid = feature.id;
      const p = feature.properties;
      const isFav = favs.has(fid);
      const isVis = visited.has(fid);
      const inRoute = routeStops.some(s => s.id === fid);
      actionsEl.innerHTML = `
        <button class="panel-action-btn${isFav ? ' active' : ''}" data-action="fav" title="${t('tipBookmark')}"><svg width="9" height="12" viewBox="0 0 11 14" fill="currentColor"><path d="M0 0h11v14l-5.5-4L0 14z"/></svg> ${t('bookmark')}</button>
        <button class="panel-action-btn${isVis ? ' active' : ''}" data-action="visited" title="${t('tipVisited')}"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6l3 3 5-6"/></svg> ${t('visited')}</button>
        <button class="panel-action-btn${inRoute ? ' active' : ''}" data-action="route" title="${inRoute ? t('tipRemoveRoute') : t('tipAddRoute')}">${inRoute ? '− ' + t('removeFromRoute') : '+ ' + t('addToRoute')}</button>`;
      actionsEl.querySelector('[data-action="fav"]').onclick = () => {
        toggleFav(fid);
        renderPanel(feature);
        renderList();
      };
      actionsEl.querySelector('[data-action="visited"]').onclick = () => {
        toggleVisited(fid);
        renderPanel(feature);
        renderList();
      };
      actionsEl.querySelector('[data-action="route"]').onclick = () => {
        const coords = feature.geometry && feature.geometry.coordinates ? feature.geometry.coordinates : null;
        toggleRoute(fid, coords, p.name);
        renderPanel(feature);
        renderList();
      };
    }

    function renderPanelCarousel(feature, det) {
      const p = feature.properties;
      const cover = det.cover || {};
      const coverUrl = cover.url || p.image || '';
      let coverCaption = cover.caption || '';
      if (!coverCaption) {
        const match = (det.gallery || []).find(g => g.url === coverUrl && g.caption);
        if (match) coverCaption = match.caption;
      }
      const images = [];
      if (coverUrl) images.push({ url: coverUrl, caption: coverCaption });
      (det.gallery || []).forEach(item => {
        if (item.url && item.url !== coverUrl) images.push(item);
      });

      const carEl   = document.getElementById('panel-carousel');
      const imgEl   = document.getElementById('carousel-img');
      const capBar  = document.getElementById('carousel-caption');
      const capText = document.getElementById('carousel-caption-text');
      const navEl   = document.getElementById('carousel-nav');
      let carouselIdx = 0;

      function showSlide(n) {
        carouselIdx = (n + images.length) % images.length;
        const item = images[carouselIdx];
        imgEl.classList.add('loading');
        imgEl.onload = () => imgEl.classList.remove('loading');
        imgEl.src = item.url;
        imgEl.alt = item.caption || '';
        capText.textContent = item.caption || '';
        capBar.style.display = (item.caption || images.length > 1) ? '' : 'none';
        capBar.style.left = item.caption ? '0' : '';
        capBar.style.background = item.caption ? 'rgba(255,255,255,0.8)' : 'transparent';
        navEl.style.background = item.caption ? 'transparent' : 'rgba(255,255,255,0.8)';
      }

      window._carouselImages = images;
      if (images.length) {
        carEl.style.display = '';
        navEl.style.display = images.length > 1 ? '' : 'none';
        showSlide(0);
        document.getElementById('carousel-prev').onclick = (e) => { e.stopPropagation(); showSlide(carouselIdx - 1); };
        document.getElementById('carousel-next').onclick = (e) => { e.stopPropagation(); showSlide(carouselIdx + 1); };
        imgEl.onclick = () => openLightbox(carouselIdx);
      } else {
        carEl.style.display = 'none';
      }
    }

    function renderPanelDescription(det, isfi) {
      const descEl = document.getElementById('panel-description');
      const desc = (isfi && det.description_fi ? det.description_fi : det.description) || '';
      if (desc) {
        const paras = desc.split('\n\n');
        let html = `<p>${paras[0]}</p>`;
        if (paras.length > 1) {
          html += `<div class="desc-rest">${paras.slice(1).map(p => `<p>${p}</p>`).join('')}</div>`;
          html += `<button class="desc-toggle">${t('readMore')}</button>`;
        }
        descEl.innerHTML = html;
        const restEl = descEl.querySelector('.desc-rest');
        const toggleBtn = descEl.querySelector('.desc-toggle');
        if (restEl && toggleBtn) {
          toggleBtn.onclick = () => {
            const expanded = restEl.classList.toggle('expanded');
            toggleBtn.textContent = expanded ? t('showLess') : t('readMore');
          };
        }
        descEl.classList.add('visible');
      } else {
        descEl.innerHTML = '';
        descEl.classList.remove('visible');
      }
    }

    function renderPanelContact(det) {
      const contactEl = document.getElementById('panel-contact');
      contactEl.innerHTML = '';
      if (det.phone) {
        contactEl.innerHTML += `
          <div class="panel-footer-row">
            <span class="panel-footer-label">${t('phone')}</span>
            <a class="panel-footer-value" href="tel:${det.phone}">${det.phone}</a>
          </div>`;
      }
      if (det.website) {
        const domain = det.website.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '');
        contactEl.innerHTML += `
          <div class="panel-footer-row">
            <span class="panel-footer-label">${t('website')}</span>
            <a class="panel-footer-value" href="${det.website}" target="_blank" rel="noopener">${domain}</a>
          </div>`;
      }
      const socialEl = document.getElementById('panel-social');
      socialEl.innerHTML = '';
      const social = det.social || {};
      const socialMap = { instagram: 'Instagram', facebook: 'Facebook', twitter: 'X' };
      Object.entries(socialMap).forEach(([key, label]) => {
        if (social[key]) {
          socialEl.innerHTML +=
            `<a class="social-link" href="${social[key]}" target="_blank" rel="noopener">${label}</a>`;
        }
      });
    }

    function renderPanel(feature) {
      const p   = feature.properties;
      const det = details[String(feature.id)] || {};
      const isfi = lang === 'fi';

      document.getElementById('panel-name').textContent =
        isfi && p.name_fi ? p.name_fi : p.name;

      const rawAddr = (isfi && p.address_fi ? p.address_fi : p.address) || '';
      const parts = rawAddr.split(',');
      document.getElementById('panel-address').textContent =
        parts.length > 2 ? parts.slice(-3).join(',').trim() : rawAddr;

      renderPanelActions(feature);
      renderPanelCarousel(feature, det);
      renderPanelDescription(det, isfi);
      renderPanelContact(det);
    }

    // ═══════════════════════════════════════════════════════
    //  Panel Open / Close
    // ═══════════════════════════════════════════════════════
    const mapEl = document.getElementById('map');

    function openPanel(feature) {
      if (feature.id == null) return;
      if (selectedId != null)
        map.setFeatureState({ source: 'aalto', id: selectedId }, { selected: false });
      selectedId = feature.id;
      map.setFeatureState({ source: 'aalto', id: selectedId }, { selected: true });
      currentFeature = feature;
      renderPanel(feature);
      // Scroll panel body to top
      const panelBody = document.getElementById('panel-body');
      if (panelBody) panelBody.scrollTop = 0;
      panel.scrollTop = 0;
      // Resize map first (no transition), then animate panel in
      mapEl.style.transition = 'none';
      mapEl.classList.add('detail-open');
      map.resize();
      requestAnimationFrame(() => { mapEl.style.transition = ''; });
      panel.classList.add('open');
      updatePanelLayout();
    }

    function closePanel() {
      panel.classList.remove('open');
      mapEl.style.transition = 'none';
      mapEl.classList.remove('detail-open');
      map.resize();
      requestAnimationFrame(() => { mapEl.style.transition = ''; });
      if (selectedId != null) {
        map.setFeatureState({ source: 'aalto', id: selectedId }, { selected: false });
        selectedId = null;
      }
      currentFeature = null;
      updatePanelLayout();
    }

    // Shared: select a feature → open panel, highlight, fly to
    function selectFeature(feature, opts) {
      openPanel(feature);
      highlightListItem(feature.id, opts);
      highlightRouteStop(feature.id);
      const randomBearing = Math.random() * 60 - 30;
      map.flyTo({
        center: feature.geometry.coordinates,
        zoom: 18, pitch: 50, bearing: randomBearing, speed: 1.8,
      });
    }

    document.getElementById('panel-close').addEventListener('click', closePanel);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closePanel(); });

    // ═══════════════════════════════════════════════════════
    //  Map Load — Data, Layers, Interactions
    // ═══════════════════════════════════════════════════════
    map.once('style.load', () => map.resize());
    map.on('load', async () => {
      const [geoRes, detRes, countriesRes, citiesRes, metroRes] = await Promise.all([
        fetch('./data/aalto_route.geojson'),
        fetch('./data/aalto_details.json').catch(() => null),
        fetch('./data/aalto_clusters_countries.geojson'),
        fetch('./data/aalto_clusters_cities.geojson'),
        fetch('./data/aalto_clusters_helsinki_metropolitan.geojson'),
      ]);

      const data = await geoRes.json();
      if (detRes?.ok) details = await detRes.json();
      const countriesData = await countriesRes.json();
      const citiesData = await citiesRes.json();
      const metroData = await metroRes.json();

      window._aaltoTotal = data.features.length;

      // ── Sources ──
      map.addSource('aalto', {
        type: 'geojson', data, generateId: true,
        cluster: true, clusterMaxZoom: 14, clusterRadius: 40,
        clusterProperties: {
          first_name: [['coalesce', ['accumulated'], ['get', 'name']], ['get', 'name']],
          first_name_fi: [
            ['coalesce', ['accumulated'], ['coalesce', ['get', 'name_fi'], ['get', 'name']]],
            ['coalesce', ['get', 'name_fi'], ['get', 'name']],
          ],
        },
      });
      map.addSource('aalto-countries', { type: 'geojson', data: countriesData });
      map.addSource('aalto-cities', { type: 'geojson', data: citiesData });
      map.addSource('aalto-metro', { type: 'geojson', data: metroData });

      // Rebuild aalto source with fav/visited as data properties (for use in layout text-field)
      rebuildAaltoSource = function() {
        const routeIds = new Set(routeStops.map(s => s.id));
        const features = data.features.map((f, i) => ({
          ...f,
          properties: {
            ...f.properties,
            _symbol: (favs.has(i) ? ' ★' : '') + (visited.has(i) ? ' ✓' : ''),
            onRoute: routeIds.has(i),
            _visited: visited.has(i),
            _fav: favs.has(i),
          },
        }));
        map.getSource('aalto').setData({ type: 'FeatureCollection', features });
        // Re-apply selected/hover feature states (setData resets them; fav/visited now use data props)
        if (selectedId !== null)
          map.setFeatureState({ source: 'aalto', id: selectedId }, { selected: true });
      };
      rebuildAaltoSource();

      // Restore saved position or fit to all points on first load
      const _savedPos = localStorage.getItem('aalto_map_pos');
      if (_savedPos) {
        try {
          const p = JSON.parse(_savedPos);
          map.jumpTo({ center: [p.lng, p.lat], zoom: p.zoom, bearing: p.bearing, pitch: p.pitch });
        } catch(e) { /* ignore corrupt data */ }
      } else {
        const lons = data.features.map(f => f.geometry.coordinates[0]);
        const lats = data.features.map(f => f.geometry.coordinates[1]);
        map.fitBounds(
          [[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]],
          { padding: { top: 80, bottom: 60, left: 60, right: 60 }, bearing: 0, pitch: 31, duration: 0 }
        );
      }

      const _clusterSymLayout = {
        'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
        'text-size': 11,
        'text-letter-spacing': 0.06,
        'text-transform': 'uppercase',
        'text-allow-overlap': false,
        'text-ignore-placement': false,
        'text-optional': true,
        'text-variable-anchor': ['left', 'right', 'top', 'bottom'],
        'text-radial-offset': 1.4,
        'text-justify': 'auto',
        'text-max-width': 14,
      };
      const _clusterSymPaint = {
        'text-color': '#000',
        'text-halo-color': '#fff',
        'text-halo-width': 2.5,
      };

      // ── Custom SDF dot image for symbol-layer points ──
      (function() {
        const sz = 32;
        const c = document.createElement('canvas');
        c.width = c.height = sz;
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, sz, sz);
        ctx.beginPath();
        ctx.arc(sz / 2, sz / 2, sz / 2 - 2, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.fill();
        const d = ctx.getImageData(0, 0, sz, sz);
        map.addImage('aalto-dot', { width: sz, height: sz, data: d.data }, { sdf: true, pixelRatio: 2 });
      })();

      // ── Country cluster layers (zoom 0–6.5) ──
      map.addLayer({
        id: 'country-clusters-stack', type: 'symbol', source: 'aalto-countries',
        slot: 'top',
        maxzoom: 6.5, filter: ['>', ['get', 'count'], 1],
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 0.57, 'icon-allow-overlap': true, 'icon-ignore-placement': true },
        paint: { 'icon-color': '#000', 'icon-opacity': 0.35, 'icon-halo-color': '#fff', 'icon-halo-width': 2, 'icon-translate': [2.5, -2.5] },
      });
      map.addLayer({
        id: 'country-clusters', type: 'symbol', source: 'aalto-countries',
        slot: 'top',
        maxzoom: 6.5,
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 0.57, 'icon-allow-overlap': true, 'icon-ignore-placement': false },
        paint: { 'icon-color': '#000', 'icon-opacity': 0.9, 'icon-halo-color': '#fff', 'icon-halo-width': 2 },
      });
      map.addLayer({
        id: 'country-labels', type: 'symbol', source: 'aalto-countries',
        slot: 'top',
        maxzoom: 6.5,
        layout: {
          ..._clusterSymLayout,
          'text-field': ['concat', ['get', 'name'], ' (', ['to-string', ['get', 'count']], ')'],
          'symbol-sort-key': ['get', 'count'],
        },
        paint: _clusterSymPaint,
      });

      // ── City cluster layers (zoom 6.5–13) ──
      map.addLayer({
        id: 'city-clusters-stack', type: 'symbol', source: 'aalto-cities',
        slot: 'top',
        minzoom: 6.5, maxzoom: 13, filter: ['>', ['get', 'count'], 1],
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 0.57, 'icon-allow-overlap': true, 'icon-ignore-placement': true },
        paint: { 'icon-color': '#000', 'icon-opacity': 0.35, 'icon-halo-color': '#fff', 'icon-halo-width': 2, 'icon-translate': [2.5, -2.5] },
      });
      map.addLayer({
        id: 'city-clusters', type: 'symbol', source: 'aalto-cities',
        slot: 'top',
        minzoom: 6.5, maxzoom: 13,
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 0.57, 'icon-allow-overlap': true, 'icon-ignore-placement': false },
        paint: { 'icon-color': '#000', 'icon-opacity': 0.9, 'icon-halo-color': '#fff', 'icon-halo-width': 2 },
      });
      map.addLayer({
        id: 'city-labels', type: 'symbol', source: 'aalto-cities',
        slot: 'top',
        minzoom: 6.5, maxzoom: 13,
        layout: {
          ..._clusterSymLayout,
          'text-field': ['concat', ['get', 'name'], ' (', ['to-string', ['get', 'count']], ')'],
          'symbol-sort-key': ['get', 'count'],
        },
        paint: _clusterSymPaint,
      });

      // ── Helsinki metro district layers (zoom 11–13) ──
      map.addLayer({
        id: 'metro-clusters-stack', type: 'symbol', source: 'aalto-metro',
        slot: 'top',
        minzoom: 11, maxzoom: 13, filter: ['>', ['get', 'count'], 1],
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 0.57, 'icon-allow-overlap': true, 'icon-ignore-placement': true },
        paint: { 'icon-color': '#000', 'icon-opacity': 0.35, 'icon-halo-color': '#fff', 'icon-halo-width': 2, 'icon-translate': [2.5, -2.5] },
      });
      map.addLayer({
        id: 'metro-clusters', type: 'symbol', source: 'aalto-metro',
        slot: 'top',
        minzoom: 11, maxzoom: 13,
        filter: ['>', ['get', 'count'], 1],
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 0.57, 'icon-allow-overlap': true, 'icon-ignore-placement': false },
        paint: { 'icon-color': '#000', 'icon-opacity': 0.9, 'icon-halo-color': '#fff', 'icon-halo-width': 2 },
      });
      map.addLayer({
        id: 'metro-labels', type: 'symbol', source: 'aalto-metro',
        slot: 'top',
        minzoom: 11, maxzoom: 13,
        filter: ['>', ['get', 'count'], 1],
        layout: {
          ..._clusterSymLayout,
          'text-field': ['concat', ['get', 'name'], ' (', ['to-string', ['get', 'count']], ')'],
          'symbol-sort-key': ['get', 'count'],
        },
        paint: _clusterSymPaint,
      });

      // ── GL-clustered dots (zoom 13+, colliding points only) ──
      map.addLayer({
        id: 'aalto-clusters-stack', type: 'symbol', source: 'aalto',
        slot: 'top',
        minzoom: 13, filter: ['has', 'point_count'],
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 0.57, 'icon-allow-overlap': true, 'icon-ignore-placement': true },
        paint: { 'icon-color': '#000', 'icon-opacity': 0.35, 'icon-halo-color': '#fff', 'icon-halo-width': 2, 'icon-translate': [2.5, -2.5] },
      });
      map.addLayer({
        id: 'aalto-clusters', type: 'symbol', source: 'aalto',
        slot: 'top',
        minzoom: 13,
        filter: ['has', 'point_count'],
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 0.57, 'icon-allow-overlap': true, 'icon-ignore-placement': false },
        paint: { 'icon-color': '#000', 'icon-opacity': 0.9, 'icon-halo-color': '#fff', 'icon-halo-width': 2 },
      });
      map.addLayer({
        id: 'aalto-cluster-labels', type: 'symbol', source: 'aalto',
        slot: 'top',
        minzoom: 13,
        filter: ['has', 'point_count'],
        layout: {
          ..._clusterSymLayout,
          'text-field': ['concat', ['get', 'first_name'], ' +', ['to-string', ['-', ['get', 'point_count'], 1]]],
          'symbol-sort-key': ['get', 'point_count'],
        },
        paint: _clusterSymPaint,
      });

      // ── Individual point layers (zoom 11+, non-clustered) ──
      // Halo: selection/fav/hover ring behind the dot (circle, no collision)
      map.addLayer({
        id: 'aalto-halo', type: 'circle', source: 'aalto',
        slot: 'top',
        minzoom: 13,
        filter: ['all', ['!', ['has', 'point_count']], ['!', ['get', 'onRoute']]],
        paint: {
          'circle-radius': ['interpolate', ['linear'], ['zoom'], 11, 5, 18, 9],
          'circle-color': '#000', 'circle-opacity': 0,
          'circle-stroke-width': 0.5, 'circle-stroke-color': '#000',
          'circle-stroke-opacity': [
            'case',
            ['boolean', ['feature-state', 'selected'], false], 1,
            ['get', '_fav'], 0.4,
            ['boolean', ['feature-state', 'hover'], false], 0.2,
            0,
          ],
        },
      });
      // Dot + label: symbol layer for proper collision detection
      map.addLayer({
        id: 'aalto-points', type: 'symbol', source: 'aalto',
        slot: 'top',
        minzoom: 13,
        filter: ['all', ['!', ['has', 'point_count']], ['!', ['get', 'onRoute']]],
        layout: {
          'icon-image': 'aalto-dot',
          // Base image 32px at pixelRatio=2 → 16 CSS px, radius 8px
          // target: radius 3px at z11, 7px at z18 → size = target/8
          'icon-size': ['interpolate', ['linear'], ['zoom'], 11, 0.375, 18, 0.875],
          'icon-allow-overlap': false,
          'icon-ignore-placement': false,
          'text-field': ['concat', ['get', 'name'], ['coalesce', ['get', '_symbol'], '']],
          'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
          'text-size': 11,
          'text-letter-spacing': 0.06,
          'text-transform': 'uppercase',
          'text-variable-anchor': ['left', 'right', 'top', 'bottom'],
          'text-radial-offset': 1.4,
          'text-justify': 'auto',
          'text-max-width': 12,
          'text-optional': true,
          'text-allow-overlap': false,
          'text-ignore-placement': false,
        },
        paint: {
          'icon-color': ['case', ['get', '_visited'], '#999', '#000'],
          'icon-halo-color': '#fff',
          'icon-halo-width': 2,
          'text-color': '#000',
          'text-halo-color': '#fff',
          'text-halo-width': 2.5,
        },
      });

      // ── Language-aware label update ──
      function updateClusterLabels() {
        const nk = lang === 'fi' ? 'name_fi' : 'name';
        const ck = lang === 'fi' ? 'city_fi' : 'city';
        const ok = lang === 'fi' ? 'object_name_fi' : 'object_name';
        const fnk = lang === 'fi' ? 'first_name_fi' : 'first_name';

        // Country: "Country, City (1)" for single-city, "Country (N)" for multi
        if (map.getLayer('country-labels'))
          map.setLayoutProperty('country-labels', 'text-field', [
            'case', ['==', ['get', 'count'], 1],
            ['concat',
              ['coalesce', ['get', nk], ['get', 'name']], ', ',
              ['coalesce', ['get', ck], ['get', 'city'], ''], ' (1)'
            ],
            ['concat', ['coalesce', ['get', nk], ['get', 'name']], ' (', ['to-string', ['get', 'count']], ')'],
          ]);

        // City: always show "CITY (N)"
        if (map.getLayer('city-labels'))
          map.setLayoutProperty('city-labels', 'text-field',
            ['concat', ['coalesce', ['get', nk], ['get', 'name']], ' (', ['to-string', ['get', 'count']], ')'],
          );

        // Metro: show object_name for count=1
        if (map.getLayer('metro-labels'))
          map.setLayoutProperty('metro-labels', 'text-field', [
            'case', ['==', ['get', 'count'], 1],
            ['coalesce', ['get', ok], ['get', 'object_name'], ['coalesce', ['get', nk], ['get', 'name']]],
            ['concat', ['coalesce', ['get', nk], ['get', 'name']], ' (', ['to-string', ['get', 'count']], ')'],
          ]);

        // GL-cluster labels: first_name (language-aware) + "+N"
        if (map.getLayer('aalto-cluster-labels'))
          map.setLayoutProperty('aalto-cluster-labels', 'text-field',
            ['concat', ['coalesce', ['get', fnk], ['get', 'first_name']], ' +', ['to-string', ['-', ['get', 'point_count'], 1]]]);

        // Individual point labels: name + fav/visited symbol (data property, not feature-state)
        if (map.getLayer('aalto-points'))
          map.setLayoutProperty('aalto-points', 'text-field',
            ['concat', ['coalesce', ['get', nk], ['get', 'name']], ['coalesce', ['get', '_symbol'], '']]);
      }
      window._updateClusterLabels = updateClusterLabels;
      updateClusterLabels();

      // ── Hover: individual points ──
      let hoveredId = null;
      map.on('mouseenter', 'aalto-points', (e) => {
        map.getCanvas().style.cursor = 'pointer';
        const id = e.features[0]?.id;
        if (id == null) return;
        if (hoveredId != null)
          map.setFeatureState({ source: 'aalto', id: hoveredId }, { hover: false });
        hoveredId = id;
        map.setFeatureState({ source: 'aalto', id: hoveredId }, { hover: true });
      });
      map.on('mouseleave', 'aalto-points', () => {
        map.getCanvas().style.cursor = '';
        if (hoveredId != null) {
          map.setFeatureState({ source: 'aalto', id: hoveredId }, { hover: false });
          hoveredId = null;
        }
      });

      // Helper: select a feature by name — open panel immediately + fly to it
      function selectFeatureByName(name, coords) {
        const match = featureList.find(f => f.name === name);
        if (match) selectFeature({ ...match.feature, id: match.id });
        else map.flyTo({ center: coords, zoom: 18, pitch: 50, speed: 1.8 });
      }

      // ── Click handlers ──
      let _skipMapClick = false;

      // Name → coordinates index for bbox zoom
      const nameToCoords = {};
      data.features.forEach(f => { nameToCoords[f.properties.name] = f.geometry.coordinates; });

      // Shared handler for cluster clicks: count=1 → open panel; count>1 → fitBounds of all objects
      function handleClusterClick(props, coords, useFitBounds = false) {
        _skipMapClick = true;
        const objects = JSON.parse(props.objects || '[]');
        if (props.count === 1) {
          selectFeatureByName(objects[0]?.name, coords);
        } else {
          const pts = objects.map(o => nameToCoords[o.name]).filter(Boolean);
          if (pts.length >= 2) {
            const lons = pts.map(c => c[0]);
            const lats = pts.map(c => c[1]);
            const bounds = [[Math.min(...lons), Math.min(...lats)], [Math.max(...lons), Math.max(...lats)]];
            if (useFitBounds) {
              const cam = map.cameraForBounds(bounds, { padding: { top: 40, bottom: 160, left: 80, right: 80 } });
              map.flyTo({ center: cam.center, zoom: 6, bearing: 0, pitch: 0, speed: 1.4 });
            } else {
              const cam = map.cameraForBounds(bounds, { padding: 80 });
              map.flyTo({ center: cam.center, zoom: Math.max(cam.zoom, 6.5), bearing: 0, pitch: 0, speed: 1.4 });
            }
          } else {
            map.flyTo({ center: coords, zoom: map.getZoom() + 3, pitch: 0, speed: 1.4 });
          }
        }
      }

      // Country cluster click
      ['country-clusters', 'country-labels'].forEach(id => {
        map.on('click', id, (e) => {
          handleClusterClick(e.features[0].properties, e.features[0].geometry.coordinates, true);
        });
        map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
      });

      // City cluster click
      ['city-clusters', 'city-labels'].forEach(id => {
        map.on('click', id, (e) => {
          handleClusterClick(e.features[0].properties, e.features[0].geometry.coordinates);
        });
        map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
      });

      // Helsinki metro district click
      ['metro-clusters', 'metro-labels'].forEach(id => {
        map.on('click', id, (e) => {
          handleClusterClick(e.features[0].properties, e.features[0].geometry.coordinates);
        });
        map.on('mouseenter', id, () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', id, () => { map.getCanvas().style.cursor = ''; });
      });

      // GL dot-cluster click → zoom in
      map.on('click', 'aalto-clusters', (e) => {
        _skipMapClick = true;
        map.flyTo({ center: e.features[0].geometry.coordinates, zoom: map.getZoom() + 2, pitch: 0 });
      });

      // Individual point click → zoom to 18 if needed + select
      map.on('click', 'aalto-points', (e) => {
        _skipMapClick = true;
        if (map.getZoom() < 17)
          map.flyTo({ center: e.features[0].geometry.coordinates, zoom: 18, pitch: 50, speed: 1.2 });
        selectFeature(e.features[0]);
      });
      map.on('mouseenter', 'aalto-points', () => {
        map.getCanvas().style.cursor = 'pointer';
      });
      map.on('mouseleave', 'aalto-points', () => {
        map.getCanvas().style.cursor = '';
      });

      // General map click → close panel if nothing hit
      map.on('click', (e) => {
        if (_skipMapClick) { _skipMapClick = false; return; }
        const hits = map.queryRenderedFeatures(e.point, {
          layers: ['aalto-points', 'aalto-clusters', 'country-clusters', 'city-clusters', 'metro-clusters', 'route-stop-markers', 'route-stop-labels'],
        });
        if (!hits.length) closePanel();
      });

      // ═════════════════════════════════════════════════════
      //  List Panel
      // ═════════════════════════════════════════════════════
      const featureList = data.features.map((f, i) => ({
        id: i,
        name: f.properties.name,
        name_fi: f.properties.name_fi,
        country: f.properties.country || 'Finland',
        feature: f,
        coords: f.geometry.coordinates,
      }));

      // Group by country, Finland first, rest alphabetical
      const groups = {};
      featureList.forEach(item => {
        if (!groups[item.country]) groups[item.country] = [];
        groups[item.country].push(item);
      });
      Object.values(groups).forEach(g => g.sort((a, b) => a.name.localeCompare(b.name)));
      const sortedCountries = Object.keys(groups).sort((a, b) => {
        if (a === 'Finland') return -1;
        if (b === 'Finland') return 1;
        return a.localeCompare(b);
      });

      // favs/visited already declared at top level

      // Apply stored feature-states
      favs.forEach(id => map.setFeatureState({ source: 'aalto', id }, { fav: true }));
      visited.forEach(id => map.setFeatureState({ source: 'aalto', id }, { visited: true }));

      // Render list
      const listBody = document.getElementById('list-body');
      let activeFilter = 'all';
      const collapsedGroups = new Set();

      renderList = function() {
        const isfi = lang === 'fi';
        const query = document.getElementById('list-search').value.toLowerCase();
        listBody.innerHTML = '';

        sortedCountries.forEach(country => {
          const items = groups[country].filter(item => {
            const name = (isfi && item.name_fi ? item.name_fi : item.name).toLowerCase();
            if (query && !name.includes(query)) return false;
            if (activeFilter === 'fav' && !favs.has(item.id)) return false;
            if (activeFilter === 'visited' && !visited.has(item.id)) return false;
            return true;
          });
          if (!items.length) return;

          const header = document.createElement('div');
          header.className = 'list-group-header';
          const isCollapsed = collapsedGroups.has(country);
          if (isCollapsed) header.classList.add('collapsed');
          header.innerHTML = `<span>${country} (${items.length})</span><span class="list-group-arrow"><svg width="8" height="5" viewBox="0 0 8 5" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1 1l3 3 3-3"/></svg></span>`;
          header.onclick = () => {
            if (collapsedGroups.has(country)) collapsedGroups.delete(country);
            else collapsedGroups.add(country);
            renderList();
          };
          listBody.appendChild(header);

          if (isCollapsed) return;

          items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'list-item';
            row.dataset.id = item.id;
            if (selectedId === item.id) row.classList.add('active');

            const nameSpan = document.createElement('span');
            nameSpan.className = 'list-item-name';
            nameSpan.textContent = isfi && item.name_fi ? item.name_fi : item.name;

            const actions = document.createElement('span');
            actions.className = 'list-actions';

            const favBtn = document.createElement('button');
            favBtn.className = 'list-action-btn' + (favs.has(item.id) ? ' active' : '');
            favBtn.innerHTML = '<svg width="9" height="12" viewBox="0 0 11 14" fill="currentColor"><path d="M0 0h11v14l-5.5-4L0 14z"/></svg>';
            favBtn.title = t('tipBookmark');
            favBtn.onclick = (e) => {
              e.stopPropagation();
              toggleFav(item.id);
              favBtn.classList.toggle('active');
              if (activeFilter === 'fav') renderList();
              if (currentFeature && currentFeature.id === item.id) renderPanelActions(currentFeature);
            };

            const visitBtn = document.createElement('button');
            visitBtn.className = 'list-action-btn' + (visited.has(item.id) ? ' active' : '');
            visitBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6l3 3 5-6"/></svg>';
            visitBtn.title = t('tipVisited');
            visitBtn.onclick = (e) => {
              e.stopPropagation();
              toggleVisited(item.id);
              visitBtn.classList.toggle('active');
              if (activeFilter === 'visited') renderList();
              if (currentFeature && currentFeature.id === item.id) renderPanelActions(currentFeature);
            };

            const routeBtn = document.createElement('button');
            const inRoute = routeStops.some(s => s.id === item.id);
            routeBtn.className = 'list-action-btn' + (inRoute ? ' active' : '');
            routeBtn.innerHTML = inRoute ? '&#8722;' : '&#43;';
            routeBtn.title = inRoute ? t('tipRemoveRoute') : t('tipAddRoute');
            routeBtn.style.fontSize = '14px';
            routeBtn.onclick = (e) => {
              e.stopPropagation();
              toggleRoute(item.id, item.coords, item.name);
              renderList();
            };

            actions.appendChild(favBtn);
            actions.appendChild(visitBtn);
            actions.appendChild(routeBtn);
            row.appendChild(nameSpan);
            row.appendChild(actions);
            listBody.appendChild(row);

            row.onclick = () => selectFeature({ ...item.feature, id: item.id });
          });
        });
        // Show "no results" when search is active but nothing matches
        if (listBody.children.length === 0 && query) {
          const noRes = document.createElement('div');
          noRes.className = 'route-empty-hint';
          noRes.textContent = t('noResults');
          listBody.appendChild(noRes);
        }
        updateListCount();
      };

      // Update destinations list count
      function updateListCount() {
        const countEl = document.getElementById('list-count');
        if (countEl) {
          const items = listBody.querySelectorAll('.list-item');
          countEl.textContent = items.length ? `(${items.length})` : '';
        }
      }

      highlightListItem = function(id, opts) {
        // Auto-expand collapsed destinations list (unless skipExpand)
        if (!(opts && opts.skipExpand)) expandDestinations();
        // Auto-expand collapsed group if needed
        const item = featureList.find(f => f.id === id);
        if (item && collapsedGroups.has(item.country)) {
          collapsedGroups.delete(item.country);
          renderList();
        }
        listBody.querySelectorAll('.list-item.active').forEach(el => el.classList.remove('active'));
        let el = listBody.querySelector(`.list-item[data-id="${id}"]`);
        // If item not in current filter, switch to ALL so it's visible
        if (!el && activeFilter !== 'all') {
          activeFilter = 'all';
          document.querySelectorAll('.list-filter-btn[data-filter]').forEach(b =>
            b.classList.toggle('active', b.dataset.filter === 'all'));
          updateRouteFromBookmarksBtn();
          renderList();
          el = listBody.querySelector(`.list-item[data-id="${id}"]`);
        }
        if (el) {
          el.classList.add('active');
          // Scroll so highlighted item is the 2nd visible in list
          const containerRect = listBody.getBoundingClientRect();
          const elRect = el.getBoundingClientRect();
          const currentScroll = listBody.scrollTop;
          const elTopInContainer = elRect.top - containerRect.top + currentScroll;
          const firstItem = listBody.querySelector('.list-item, .list-group-header');
          const itemHeight = firstItem ? firstItem.getBoundingClientRect().height + 1 : 44;
          listBody.scrollTo({ top: Math.max(0, elTopInContainer - itemHeight), behavior: 'smooth' });
        }
      }

      // Store original closePanel to extend
      const _origClosePanel = closePanel;
      closePanel = function() {
        _origClosePanel();
        listBody.querySelectorAll('.list-item.active').forEach(el => el.classList.remove('active'));
      };
      document.getElementById('panel-close').removeEventListener('click', _origClosePanel);
      document.getElementById('panel-close').addEventListener('click', closePanel);

      // Initial filter counts
      updateFilterCounts();

      // Search
      const searchInput = document.getElementById('list-search');
      const searchClear = document.getElementById('list-search-clear');
      searchInput.addEventListener('input', () => {
        searchClear.style.display = searchInput.value ? 'block' : 'none';
        if (searchInput.value) expandDestinations();
        renderList();
      });
      searchClear.addEventListener('click', () => {
        searchInput.value = '';
        searchClear.style.display = 'none';
        renderList();
        searchInput.focus();
      });

      // Filters
      // Show "New Route From Bookmarks" only in bookmarks tab with 2+ bookmarks
      function updateRouteFromBookmarksBtn() {
        const rfb = document.getElementById('route-from-bookmarks');
        rfb.style.display = (activeFilter === 'fav' && favs.size >= 2) ? '' : 'none';
      }
      updateRouteFromBookmarksBtn();

      document.querySelectorAll('.list-filter-btn[data-filter]').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.list-filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          expandDestinations();
          renderList();
          updateRouteFromBookmarksBtn();
        });
      });

      // "New Route From Bookmarks" — clears existing route, adds all bookmarks, optimizes
      document.getElementById('route-from-bookmarks').onclick = (e) => {
        e.stopPropagation();
        // Clear existing route
        routeStops.length = 0;
        routeSegments = [];
        // Add all bookmarked items
        [...favs].forEach(id => {
          const item = featureList.find(f => f.id === id);
          if (item) {
            routeStops.push({ id: item.id, coords: item.coords, name: item.name });
          }
        });
        if (routeStops.length >= 2) {
          saveRoute();
          document.getElementById('route-section').classList.remove('collapsed');
          updatePanelLayout();
          renderRouteSection();
          renderList();
          // Auto-optimize after calculating
          calculateAllSegments().then(() => {
            if (routeStops.length >= 3 && getDirectionsService()) {
              document.getElementById('route-optimize').click();
            }
          });
          fitRouteOverview();
        } else {
          saveRoute();
          renderRouteSection();
          renderList();
        }
      };

      // ═════════════════════════════════════════════════════
      //  Layout Management
      // ═════════════════════════════════════════════════════
      let listCollapsed = false;
      document.getElementById('list-section-header').onclick = () => {
        listCollapsed = !listCollapsed;
        document.getElementById('list-body').style.display = listCollapsed ? 'none' : '';
        document.getElementById('list-toggle').style.transform = listCollapsed ? 'rotate(-90deg)' : '';
        document.getElementById('list-panel').classList.toggle('list-collapsed', listCollapsed);
        updatePanelLayout();
      };

      // Expand destinations list programmatically
      function expandDestinations() {
        if (listCollapsed) {
          listCollapsed = false;
          document.getElementById('list-body').style.display = '';
          document.getElementById('list-toggle').style.transform = '';
          document.getElementById('list-panel').classList.remove('list-collapsed');
          updatePanelLayout();
        }
      }

      // Update panel layout based on collapse state
      updatePanelLayout = function() {
        const routeCollapsed = document.getElementById('route-section').classList.contains('collapsed');
        const bothCollapsed = listCollapsed && routeCollapsed;
        const listPanel = document.getElementById('list-panel');
        const panelEl = document.getElementById('panel');
        const panelOpen = panelEl.classList.contains('open');

        listPanel.classList.toggle('minimized', bothCollapsed);

        if (bothCollapsed) {
          const listHeight = listPanel.offsetHeight;
          panelEl.style.top = listHeight + 'px';
          panelEl.style.height = `calc(100vh - ${listHeight}px)`;
          panelEl.style.right = '0';
          panelEl.style.width = '33.33vw';
          mapEl.classList.remove('detail-open');
          mapEl.style.width = '100vw';
        } else if (listCollapsed) {
          panelEl.style.top = ''; panelEl.style.height = '';
          panelEl.style.right = ''; panelEl.style.width = '';
          mapEl.style.width = '100vw';
          if (panelOpen && !mapEl.classList.contains('detail-open'))
            mapEl.classList.add('detail-open');
        } else {
          panelEl.style.top = ''; panelEl.style.height = '';
          panelEl.style.right = ''; panelEl.style.width = '';
          mapEl.style.width = '';
          if (panelOpen && !mapEl.classList.contains('detail-open'))
            mapEl.classList.add('detail-open');
        }
        mapEl.style.transition = 'none';
        map.resize();
        requestAnimationFrame(() => { mapEl.style.transition = ''; });
      };

      // Fit map to route overview
      fitRouteOverview = function() {
        if (routeStops.length < 2) return;
        const bounds = new mapboxgl.LngLatBounds();
        routeStops.forEach(s => bounds.extend(s.coords));
        map.fitBounds(bounds, { padding: 80, pitch: 0, duration: 1000 });
      };

      // Make renderList available for language switch
      window._renderList = renderList;

      // ═════════════════════════════════════════════════════
      //  Route — State, Calculation & UI
      // ═════════════════════════════════════════════════════
      // modeLabels, modeOrder declared at top level
      let directionsService = null;
      function getDirectionsService() {
        if (!directionsService && typeof google !== 'undefined' && google.maps) {
          directionsService = new google.maps.DirectionsService();
        }
        return directionsService;
      }

      // Route map layers
      map.addSource('route-line', { type: 'geojson', data: { type: 'FeatureCollection', features: [] } });
      map.addSource('route-stops-src', {
        type: 'geojson',
        data: { type: 'FeatureCollection', features: [] },
        cluster: true, clusterMaxZoom: 12, clusterRadius: 22,
        clusterProperties: {
          min_num: ['min', ['to-number', ['get', 'num']]],
          max_num: ['max', ['to-number', ['get', 'num']]],
        },
      });

      // Route line layers (different dash patterns per mode)
      map.addLayer({
        id: 'route-driving', type: 'line', source: 'route-line',
        slot: 'top',
        filter: ['==', ['get', 'mode'], 'DRIVING'],
        paint: { 'line-color': '#000', 'line-width': 1.5, 'line-opacity': 0.8 },
      }, 'country-clusters-stack');
      map.addLayer({
        id: 'route-walking', type: 'line', source: 'route-line',
        slot: 'top',
        filter: ['==', ['get', 'mode'], 'WALKING'],
        paint: {
          'line-color': '#000', 'line-width': 1.5, 'line-opacity': 0.8,
          'line-dasharray': [4, 3],
        },
      }, 'country-clusters-stack');
      map.addLayer({
        id: 'route-bicycling', type: 'line', source: 'route-line',
        slot: 'top',
        filter: ['==', ['get', 'mode'], 'BICYCLING'],
        paint: {
          'line-color': '#000', 'line-width': 1.5, 'line-opacity': 0.8,
          'line-dasharray': [1.5, 3],
        },
      }, 'country-clusters-stack');
      map.addLayer({
        id: 'route-transit', type: 'line', source: 'route-line',
        slot: 'top',
        filter: ['==', ['get', 'mode'], 'TRANSIT'],
        paint: {
          'line-color': '#000', 'line-width': 1.5, 'line-opacity': 0.8,
          'line-dasharray': [6, 2.5, 1.5, 2.5],
        },
      }, 'country-clusters-stack');

      // Route stop cluster marker (same style as individual stops)
      map.addLayer({
        id: 'route-stop-cluster-markers', type: 'symbol', source: 'route-stops-src',
        slot: 'top',
        filter: ['has', 'point_count'],
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 1.14, 'icon-allow-overlap': true, 'icon-ignore-placement': false },
        paint: { 'icon-color': '#000', 'icon-halo-color': '#fff', 'icon-halo-width': 2 },
      });
      map.addLayer({
        id: 'route-stop-cluster-labels', type: 'symbol', source: 'route-stops-src',
        slot: 'top',
        filter: ['has', 'point_count'],
        layout: {
          'text-field': ['concat', ['to-string', ['get', 'min_num']], '–', ['to-string', ['get', 'max_num']]],
          'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
          'text-size': 11,
          'text-letter-spacing': 0.06,
          'text-transform': 'uppercase',
          'text-variable-anchor': ['left', 'right', 'top', 'bottom'],
          'text-radial-offset': 0.9,
          'text-justify': 'auto',
          'text-allow-overlap': true,
          'text-ignore-placement': false,
        },
        paint: { 'text-color': '#000', 'text-halo-color': '#fff', 'text-halo-width': 2.5 },
      });

      // Numbered stop markers (individual, non-clustered)
      map.addLayer({
        id: 'route-stop-markers', type: 'symbol', source: 'route-stops-src',
        slot: 'top',
        filter: ['!', ['has', 'point_count']],
        layout: { 'icon-image': 'aalto-dot', 'icon-size': 1.14, 'icon-allow-overlap': true, 'icon-ignore-placement': false },
        paint: { 'icon-color': '#000', 'icon-halo-color': '#fff', 'icon-halo-width': 2 },
      });
      map.addLayer({
        id: 'route-stop-numbers', type: 'symbol', source: 'route-stops-src',
        slot: 'top',
        filter: ['!', ['has', 'point_count']],
        layout: {
          'text-field': ['get', 'num'],
          'text-font': ['DIN Pro Bold', 'Arial Unicode MS Bold'],
          'text-size': 10,
          'text-allow-overlap': true,
          'text-ignore-placement': false,
        },
        paint: { 'text-color': '#fff' },
      });
      map.addLayer({
        id: 'route-stop-labels', type: 'symbol', source: 'route-stops-src',
        slot: 'top',
        filter: ['!', ['has', 'point_count']],
        layout: {
          'text-field': ['get', 'name'],
          'text-font': ['DIN Pro Medium', 'Arial Unicode MS Regular'],
          'text-size': 11,
          'text-letter-spacing': 0.06,
          'text-transform': 'uppercase',
          'text-variable-anchor': ['left', 'right', 'top', 'bottom'],
          'text-radial-offset': 0.9,
          'text-justify': 'auto',
          'text-allow-overlap': true,
          'text-ignore-placement': false,
        },
        paint: { 'text-color': '#000', 'text-halo-color': '#fff', 'text-halo-width': 2.5 },
      });

      // Route stop marker click handlers
      function handleRouteStopClick(e) {
        _skipMapClick = true;
        const stopId = e.features[0].properties.stopId;
        const item = featureList.find(f => f.id === stopId);
        if (item) selectFeature({ ...item.feature, id: item.id }, { skipExpand: true });
      }
      map.on('click', 'route-stop-markers', handleRouteStopClick);
      map.on('click', 'route-stop-labels', handleRouteStopClick);
      map.on('mouseenter', 'route-stop-markers', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'route-stop-markers', () => { map.getCanvas().style.cursor = ''; });
      map.on('mouseenter', 'route-stop-labels', () => { map.getCanvas().style.cursor = 'pointer'; });
      map.on('mouseleave', 'route-stop-labels', () => { map.getCanvas().style.cursor = ''; });

      // Get default mode for a segment based on distance
      function getDefaultMode(from, to) {
        if (globalMode === 'WALKING') return 'WALKING';
        if (walkThreshold <= 0) return globalMode;
        const R = 6371000; // meters
        const dLat = (to[1] - from[1]) * Math.PI / 180;
        const dLng = (to[0] - from[0]) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(from[1]*Math.PI/180) * Math.cos(to[1]*Math.PI/180) * Math.sin(dLng/2)**2;
        const dist = R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return dist < walkThreshold ? 'WALKING' : globalMode;
      }

      // Calculate one segment via Google Directions
      async function calculateSegment(from, to, mode) {
        if (!getDirectionsService()) return null;
        return new Promise((resolve) => {
          getDirectionsService().route({
            origin: new google.maps.LatLng(from[1], from[0]),
            destination: new google.maps.LatLng(to[1], to[0]),
            travelMode: google.maps.TravelMode[mode],
          }, (result, status) => {
            if (status === 'OK' && result.routes.length) {
              const path = result.routes[0].overview_path.map(p => [p.lng(), p.lat()]);
              const leg = result.routes[0].legs[0];
              resolve({
                geometry: path,
                distance: leg.distance.value,
                duration: leg.duration.value,
                distanceText: leg.distance.text,
                durationText: leg.duration.text,
              });
            } else {
              resolve(null);
            }
          });
        });
      }

      // Calculate all segments
      calculateAllSegments = async function() {
        const loadingEl = document.getElementById('route-loading');
        if (routeStops.length < 2) {
          routeSegments = [];
          updateRouteOnMap();
          renderRouteSection();
          if (loadingEl) loadingEl.style.display = 'none';
          return;
        }
        if (loadingEl) loadingEl.style.display = '';
        const newSegments = [];
        for (let i = 0; i < routeStops.length - 1; i++) {
          const existing = routeSegments[i];
          const mode = (existing && existing.modeOverride) || getDefaultMode(routeStops[i].coords, routeStops[i+1].coords);
          const result = await calculateSegment(routeStops[i].coords, routeStops[i+1].coords, mode);
          newSegments.push({
            fromIdx: i, toIdx: i + 1,
            mode,
            modeOverride: existing ? existing.modeOverride : null,
            ...(result || { geometry: [routeStops[i].coords, routeStops[i+1].coords], distance: 0, duration: 0, distanceText: '?', durationText: '?' }),
          });
        }
        routeSegments = newSegments;
        updateRouteOnMap();
        renderRouteSection();
        if (loadingEl) loadingEl.style.display = 'none';
      };

      // Update map sources
      function updateRouteOnMap() {
        const lineFeatures = routeSegments.map(seg => ({
          type: 'Feature',
          properties: { mode: seg.mode },
          geometry: { type: 'LineString', coordinates: seg.geometry },
        }));
        map.getSource('route-line').setData({ type: 'FeatureCollection', features: lineFeatures });

        const stopFeatures = routeStops.map((s, i) => ({
          type: 'Feature',
          properties: { num: String(i + 1), stopId: s.id, name: s.name },
          geometry: { type: 'Point', coordinates: s.coords },
        }));
        map.getSource('route-stops-src').setData({ type: 'FeatureCollection', features: stopFeatures });
      }

      // Format duration
      function fmtDuration(sec) {
        if (sec < 60) return `${sec}s`;
        const h = Math.floor(sec / 3600);
        const m = Math.round((sec % 3600) / 60);
        return h ? `${h}h ${m}min` : `${m} min`;
      }

      // Render route section UI
      // Build a single route stop row with click, remove, drag-drop handlers
      function buildRouteStopRow(stop, i, stopsList) {
        const row = document.createElement('div');
        row.className = 'route-stop-row';
        row.draggable = true;
        row.dataset.idx = i;
        row.dataset.id = stop.id;

        const isFav = favs.has(stop.id);
        const isVis = visited.has(stop.id);
        const indicators =
          (isFav ? `<span class="route-stop-indicator" title="${t('tipBookmarked')}"><svg width="8" height="10" viewBox="0 0 11 14" fill="currentColor"><path d="M0 0h11v14l-5.5-4L0 14z"/></svg></span>` : '') +
          (isVis ? `<span class="route-stop-indicator" title="${t('tipVisitedMark')}"><svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6l3 3 5-6"/></svg></span>` : '');

        row.innerHTML = `
          <span class="route-stop-handle" title="${t('tipDragReorder')}" style="cursor:grab">&#9776;</span>
          <span class="route-stop-num">${i + 1}</span>
          <span class="route-stop-name">${stop.name}</span>
          ${indicators}
          <button class="route-stop-remove" title="${t('tipRemoveStop')}" data-idx="${i}">&times;</button>`;
        stopsList.appendChild(row);

        row.onclick = (e) => {
          if (e.target.closest('.route-stop-remove') || e.target.closest('.route-stop-handle')) return;
          const item = featureList.find(f => String(f.id) === String(stop.id));
          if (item) selectFeature({ ...item.feature, id: item.id }, { skipExpand: true });
        };
        row.querySelector('.route-stop-remove').onclick = (e) => {
          e.stopPropagation();
          routeStops.splice(i, 1);
          saveRoute();
          renderList();
          renderRouteSection();
          calculateAllSegments();
        };

        // Drag-and-drop
        row.addEventListener('dragstart', (e) => {
          e.dataTransfer.setData('text/plain', String(i));
          row.style.opacity = '0.4';
        });
        row.addEventListener('dragend', () => { row.style.opacity = ''; });
        row.addEventListener('dragover', (e) => {
          e.preventDefault();
          row.style.borderTop = '2px solid #000';
        });
        row.addEventListener('dragleave', () => { row.style.borderTop = ''; });
        row.addEventListener('drop', (e) => {
          e.preventDefault();
          row.style.borderTop = '';
          const fromIdx = parseInt(e.dataTransfer.getData('text/plain'));
          const toIdx = i;
          if (fromIdx !== toIdx) {
            const [moved] = routeStops.splice(fromIdx, 1);
            routeStops.splice(toIdx, 0, moved);
            routeSegments = [];
            saveRoute();
            renderRouteSection();
            calculateAllSegments();
          }
        });
      }

      // Build a segment info row with mode cycling arrows
      function buildRouteSegmentRow(seg, i, stopsList) {
        const segRow = document.createElement('div');
        segRow.className = 'route-segment-info';
        const ml = i18n[lang].modeLabels;
        segRow.innerHTML = `
          <span class="seg-mode-wrap">
            <span class="seg-arrow seg-prev" title="${t('tipPrevMode')}" data-seg="${i}"><svg width="5" height="8" viewBox="0 0 5 8" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M4 1L1 4l3 3"/></svg></span>
            <span class="seg-mode-label" title="${t('tipChangeMode')}" data-mode="${seg.mode}">${ml[seg.mode] || seg.mode}</span>
            <span class="seg-arrow seg-next" title="${t('tipNextMode')}" data-seg="${i}"><svg width="5" height="8" viewBox="0 0 5 8" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1 1l3 3-3 3"/></svg></span>
          </span>
          <span class="seg-details">&middot; ${seg.distanceText || '...'} &middot; ${seg.durationText || '...'}</span>`;
        stopsList.appendChild(segRow);

        function cycleSegMode(direction) {
          const curIdx = modeOrder.indexOf(seg.mode);
          const nextMode = modeOrder[(curIdx + direction + modeOrder.length) % modeOrder.length];
          routeSegments[i].mode = nextMode;
          routeSegments[i].modeOverride = nextMode;
          saveRoute();
          calculateSegment(routeStops[i].coords, routeStops[i+1].coords, nextMode).then(result => {
            if (result) Object.assign(routeSegments[i], result);
            updateRouteOnMap();
            renderRouteSection();
          });
        }
        segRow.querySelector('.seg-prev').onclick = (e) => { e.stopPropagation(); cycleSegMode(-1); };
        segRow.querySelector('.seg-next').onclick = (e) => { e.stopPropagation(); cycleSegMode(1); };
        segRow.querySelector('.seg-mode-label').onclick = (e) => { e.stopPropagation(); cycleSegMode(1); };
      }

      renderRouteSection = function() {
        const section = document.getElementById('route-section');
        const summary = document.getElementById('route-summary');
        const summaryRow = document.getElementById('route-summary-row');
        const stopsList = document.getElementById('route-stops-list');
        const thresholdRow = document.getElementById('route-walk-threshold');
        const actionsBar = document.getElementById('route-actions-bar');
        const collapsedInfo = document.getElementById('route-collapsed-info');
        const collapsedSummary = document.getElementById('route-collapsed-summary');

        // Empty state
        if (routeStops.length === 0) {
          summary.textContent = '';
          stopsList.innerHTML = `<div class="route-empty-hint">${t('routeEmpty')}</div>`;
          actionsBar.style.display = 'none';
          summaryRow.style.display = 'none';
          collapsedInfo.style.display = 'none';
          thresholdRow.classList.add('hidden');
          updateModeBar(false);
          return;
        }
        actionsBar.style.display = '';
        summaryRow.style.display = '';

        thresholdRow.classList.toggle('hidden', globalMode === 'WALKING');
        document.getElementById('walk-threshold-input').value = walkThreshold > 0 ? String(walkThreshold) : '';

        const isMixed = routeSegments.some(seg => seg.modeOverride && seg.modeOverride !== globalMode);
        updateModeBar(isMixed);

        // Summary
        const totalDist = routeSegments.reduce((s, seg) => s + (seg.distance || 0), 0);
        const totalDur = routeSegments.reduce((s, seg) => s + (seg.duration || 0), 0);
        const distKm = (totalDist / 1000).toFixed(1);
        const modeText = isMixed ? ` \u00b7 ${t('mixed')}` : '';
        summary.textContent = routeStops.length > 1
          ? `${routeStops.length} ${t('stops')} \u00b7 ${distKm} km \u00b7 ${fmtDuration(totalDur)}${modeText}`
          : `${routeStops.length} ${t('stop')}`;

        collapsedSummary.textContent = summary.textContent;
        const isCollapsed = section.classList.contains('collapsed');
        collapsedInfo.style.display = isCollapsed ? '' : 'none';

        // Build stop rows with interleaved segment info
        stopsList.innerHTML = '';
        routeStops.forEach((stop, i) => {
          buildRouteStopRow(stop, i, stopsList);
          if (i < routeSegments.length) {
            buildRouteSegmentRow(routeSegments[i], i, stopsList);
          }
        });
      };

      // Highlight route stop row by ID
      highlightRouteStop = function(id) {
        document.querySelectorAll('.route-stop-row').forEach(r => r.classList.remove('active'));
        const sid = String(id);
        const idx = routeStops.findIndex(s => String(s.id) === sid);
        if (idx >= 0) {
          const rows = document.querySelectorAll('.route-stop-row');
          if (rows[idx]) {
            rows[idx].classList.add('active');
            rows[idx].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            document.getElementById('route-section').classList.remove('collapsed');
            updatePanelLayout();
          }
        }
      };

      // ═════════════════════════════════════════════════════
      //  Route — Mode, Optimization & Export
      // ═════════════════════════════════════════════════════
      function updateModeBar(isMixed) {
        document.querySelectorAll('.route-mode-btn').forEach(b => {
          if (isMixed) {
            b.classList.remove('active');
          } else {
            b.classList.toggle('active', b.dataset.mode === globalMode);
          }
        });
      }

      // Route section toggle (expand/collapse)
      document.getElementById('route-section-header').onclick = (e) => {
        const routeSection = document.getElementById('route-section');
        routeSection.classList.toggle('collapsed');
        const collapsed = routeSection.classList.contains('collapsed');
        const ci = document.getElementById('route-collapsed-info');
        ci.style.display = (collapsed && routeStops.length > 0) ? '' : 'none';
        updatePanelLayout();
      };

      // Clear route (button next to summary)
      document.getElementById('route-clear').onclick = (e) => {
        routeStops.length = 0;
        routeSegments = [];
        saveRoute();
        updateRouteOnMap();
        renderRouteSection();
        renderList();
      };

      // Global mode selector — clears all per-segment overrides
      document.querySelectorAll('.route-mode-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          globalMode = btn.dataset.mode;
          saveRoute();
          // Clear ALL overrides, recalculate everything
          routeSegments.forEach(seg => { seg.modeOverride = null; seg.mode = null; });
          calculateAllSegments();
        });
      });

      // Walk threshold input
      const walkInput = document.getElementById('walk-threshold-input');
      function applyWalkThreshold() {
        const val = parseInt(walkInput.value) || 0;
        walkInput.value = val > 0 ? String(val) : '';
        if (val === walkThreshold) return;
        walkThreshold = val;
        saveRoute();
        routeSegments.forEach(seg => { if (!seg.modeOverride) seg.mode = null; });
        calculateAllSegments();
      }
      walkInput.addEventListener('blur', applyWalkThreshold);
      walkInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); walkInput.blur(); }
      });

      // Optimize order
      document.getElementById('route-optimize').onclick = () => {
        if (routeStops.length < 3 || !getDirectionsService()) return;
        const first = routeStops[0];
        const last = routeStops[routeStops.length - 1];
        const waypoints = routeStops.slice(1, -1).map(s => ({
          location: new google.maps.LatLng(s.coords[1], s.coords[0]),
        }));
        getDirectionsService().route({
          origin: new google.maps.LatLng(first.coords[1], first.coords[0]),
          destination: new google.maps.LatLng(last.coords[1], last.coords[0]),
          waypoints,
          optimizeWaypoints: true,
          travelMode: google.maps.TravelMode[globalMode],
        }, (result, status) => {
          if (status === 'OK') {
            const order = result.routes[0].waypoint_order;
            const middle = routeStops.slice(1, -1);
            const reordered = [first, ...order.map(i => middle[i]), last];
            routeStops.length = 0;
            routeStops.push(...reordered);
            routeSegments = [];
            saveRoute();
            calculateAllSegments();
            renderList();
          } else {
            showToast(t('optimizationFailed'), 4000);
          }
        });
      };

      // Open route in Google Maps (with travelmode + mixed mode fallback)
      const gmapsHandler = () => {
        if (routeStops.length < 2) return;
        const origin = routeStops[0];
        const dest = routeStops[routeStops.length - 1];
        const modeMap = { DRIVING: 'driving', WALKING: 'walking', BICYCLING: 'bicycling', TRANSIT: 'transit' };

        // Detect mixed mode (explicit override or walk-threshold auto-walk)
        const isMixed = routeSegments.some(seg =>
          (seg.modeOverride && seg.modeOverride !== globalMode) ||
          (seg.mode && seg.mode !== globalMode));
        let effectiveMode = globalMode;

        function openGmaps() {
          const travelmode = modeMap[effectiveMode] || 'driving';
          let url = `https://www.google.com/maps/dir/?api=1&origin=${origin.coords[1]},${origin.coords[0]}&destination=${dest.coords[1]},${dest.coords[0]}&travelmode=${travelmode}`;
          if (routeStops.length > 2) {
            const waypoints = routeStops.slice(1, -1).map(s => `${s.coords[1]},${s.coords[0]}`).join('|');
            url += `&waypoints=${encodeURIComponent(waypoints)}`;
          }
          window.open(url, '_blank');
        }

        if (isMixed) {
          const modeCounts = {};
          routeSegments.forEach(seg => { modeCounts[seg.mode] = (modeCounts[seg.mode] || 0) + 1; });
          effectiveMode = Object.entries(modeCounts).sort((a, b) => b[1] - a[1])[0][0];
          const ml = i18n[lang].modeLabels;
          showToast(t('mixedModeWarning').replace('{mode}', ml[effectiveMode] || effectiveMode), 5000);
          setTimeout(openGmaps, 3000);
        } else {
          openGmaps();
        }
      };
      document.getElementById('route-gmaps').onclick = gmapsHandler;
      document.getElementById('route-collapsed-gmaps').onclick = gmapsHandler;

      // Restore global mode button state + threshold
      document.querySelectorAll('.route-mode-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.mode === globalMode);
      });
      document.getElementById('walk-threshold-input').value = walkThreshold > 0 ? String(walkThreshold) : '';

      // Init route section + restore saved route
      renderRouteSection();
      if (routeStops.length >= 2) {
        // Wait for Google Maps API if loaded async
        function tryCalculateRoute() {
          if (getDirectionsService()) {
            calculateAllSegments();
          } else {
            setTimeout(tryCalculateRoute, 200);
          }
        }
        tryCalculateRoute();
      }

      renderList();
    });
  </script>
</body>
</html>
