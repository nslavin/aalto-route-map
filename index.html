<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aalto Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.css" rel="stylesheet">
  <link href="./styles.css" rel="stylesheet">
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.19.0/mapbox-gl.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCg0KE9pBhJcrL-6YZphVgde2iCukX4GRU&loading=async" async></script>
</head>
<body>

  <div id="map"></div>

  <div id="header">
    <h1 id="header-title">Alvar Aalto Route</h1>
    <p id="header-sub">Architectural Heritage Map</p>
    <div id="lang-switch">
      <button class="lang-btn active" data-lang="en">EN</button>
      <span class="lang-sep">/</span>
      <button class="lang-btn" data-lang="fi">FI</button>
    </div>
    <a id="header-source" href="https://visit.alvaraalto.fi/en/alvar-aalto-route/" target="_blank" rel="noopener">Source: visit.alvaraalto.fi</a>
  </div>

  <div id="list-panel">
    <div id="list-section-header">
      <span id="list-toggle"><svg width="8" height="5" viewBox="0 0 8 5" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1 1l3 3 3-3"/></svg></span>
      <span>DESTINATIONS</span>
      <span id="list-count"></span>
    </div>
    <div id="list-header">
      <div id="list-search-wrap">
        <input id="list-search" type="text" placeholder="Search...">
        <button id="list-search-clear" title="Clear">&times;</button>
      </div>
      <div id="list-filters">
        <button class="list-filter-btn active" data-filter="all">All</button>
        <button class="list-filter-btn" data-filter="fav"><svg width="10" height="12" viewBox="0 0 11 14" fill="currentColor"><path d="M0 0h11v14l-5.5-4L0 14z"/></svg> Bookmarks <span class="filter-count"></span></button>
        <button class="list-filter-btn" data-filter="visited"><svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 6l3 3 5-6"/></svg> Visited <span class="filter-count"></span></button>
        <span class="list-sort-wrap"><span id="list-sort-label" class="list-sort-label">SORT:</span>
        <div id="list-sort-dropdown" class="list-sort-dropdown">
          <button type="button" id="list-sort-trigger" class="list-sort-trigger" aria-haspopup="listbox" aria-expanded="false">
            <span id="list-sort-value">Distance</span><svg class="list-sort-arrow" width="8" height="5" viewBox="0 0 8 5"><path fill="currentColor" d="M1 1l3 3 3-3"/></svg>
          </button>
          <div id="list-sort-menu" class="list-sort-menu" role="listbox" aria-hidden="true">
            <div class="list-sort-option active" data-sort="distance" role="option">Distance</div>
            <div class="list-sort-option" data-sort="alphabet" role="option">Alphabet</div>
          </div>
        </div></span>
      </div>
    </div>
    <button id="route-from-bookmarks" class="route-from-bookmarks-btn" style="display:none">NEW ROUTE FROM BOOKMARKS</button>
    <div id="list-body"></div>
    <div id="route-section">
      <div id="route-section-header">
        <span id="route-toggle"><svg width="8" height="5" viewBox="0 0 8 5" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M1 1l3 3 3-3"/></svg></span>
        <span class="route-title">TRIP PLANNER</span>
      </div>
      <div id="route-collapsed-info" style="display:none">
        <span id="route-collapsed-summary"></span>
        <button id="route-collapsed-gmaps" class="route-action-link">OPEN IN GOOGLE MAPS</button>
      </div>
      <div id="route-section-body">
        <div id="route-mode-bar">
          <button class="route-mode-btn active" data-mode="DRIVING">CAR</button>
          <button class="route-mode-btn" data-mode="WALKING">PEDESTRIAN</button>
          <button class="route-mode-btn" data-mode="TRANSIT">PUBLIC TRANSPORT</button>
          <button class="route-mode-btn" data-mode="BICYCLING">BICYCLE</button>
        </div>
        <div id="route-walk-threshold" class="route-threshold-row">
          <span>WALK UNDER</span>
          <input id="walk-threshold-input" type="text" placeholder="OFF" inputmode="numeric">
          <span class="threshold-unit">M</span>
        </div>
        <div id="route-summary-row" style="display:none">
          <span id="route-summary"></span>
          <span id="route-loading" class="loading-dots" style="display:none"><span>.</span><span>.</span><span>.</span></span>
          <button id="route-clear" class="route-clear-text-btn">CLEAR</button>
        </div>
        <div id="route-stops-list"></div>
        <div id="route-actions-bar">
          <button id="route-optimize" class="route-action-link">OPTIMIZE ROUTE</button>
          <button id="route-gmaps" class="route-action-link">OPEN IN GOOGLE MAPS</button>
        </div>
      </div>
    </div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <span>INFO</span>
      <button id="panel-close" title="Close">&#x2715;</button>
    </div>

    <div id="panel-carousel">
      <img id="carousel-img" src="" alt="">
      <div id="carousel-caption">
        <span id="carousel-caption-text"></span>
        <div id="carousel-nav">
          <button id="carousel-prev">&#8592;</button>
          <button id="carousel-next">&#8594;</button>
        </div>
      </div>
    </div>

    <div id="panel-body">
      <h2 id="panel-name"></h2>
      <div id="panel-actions"></div>
      <p id="panel-address"></p>

      <div id="panel-footer">
        <div id="panel-contact"></div>
        <div id="panel-social"></div>
      </div>

      <div id="panel-description"></div>
    </div>
  </div>

  <div id="toast"></div>

  <div id="lightbox">
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-caption"></div>
    <div id="lightbox-thumbs"></div>
    <button id="lightbox-close">&#x2715;</button>
    <button id="lightbox-prev">&#8592;</button>
    <button id="lightbox-next">&#8594;</button>
  </div>

  <script src="./js/state.js"></script>
  <script src="./js/toast.js"></script>
  <script src="./js/i18n.js"></script>
  <script src="./js/lightbox.js"></script>
  <script src="./js/panel.js"></script>
  <script src="./js/map-init.js"></script>
</body>
</html>
